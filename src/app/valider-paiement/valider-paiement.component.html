<section class="bg-white p-4 rounded-4 shadow">
  <!-- Spinner chargement -->
  <div class="d-flex justify-content-center align-items-center" *ngIf="loading" style="height: 300px;">
    <div class="spinner-border text-dark" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>
 

  <!-- Contenu affiché seulement si loading est false -->
  <div *ngIf="!loading"  >
    <div class="w-100 w-md-75 w-lg-75 mx-auto">
      <div class="row g-4">
        <!-- Matricule -->
        <div class="col-12 col-md-6">
          <label class="form-label text-dark fw-semibold">Matricule</label>
          <input type="text" class="form-control border-0 text-dark" style="background-color: #f1f1f1;" [(ngModel)]="Metricule" disabled>
        </div>

        <!-- Classe -->
        <div class="col-12 col-md-6">
          <label class="form-label text-dark fw-semibold">Classe</label>
          <input type="text" class="form-control border-0 text-dark" style="background-color: #f1f1f1;" [(ngModel)]="Classe" disabled>
        </div>

        <!-- Nom -->
        <div class="col-12 col-md-6">
          <label class="form-label text-dark fw-semibold">Nom</label>
          <input type="text" class="form-control border-0 text-dark" style="background-color: #f1f1f1;" [(ngModel)]="Nom" disabled>
        </div>

        <!-- Prénom -->
        <div class="col-12 col-md-6">
          <label class="form-label text-dark fw-semibold">Prénom</label>
          <input type="text" class="form-control border-0 text-dark" style="background-color: #f1f1f1;" [(ngModel)]="Prenom" disabled>
        </div>
      </div>
    </div>

    <!-- Liste des frais -->
    <div class="container mt-5">
  <div class="row g-4">
    
    <div class="col-lg-4 col-md-6 col-12" *ngFor="let elem of tabDetailProduits">
      
      <div class="card frais-card h-100 shadow-sm"
           (click)="openDialog(elem)">
        
        <div class="card-header bg-danger text-white border-0">
          <h5 class="mb-1 fw-bold">{{ elem.Libelle }}</h5>
          <small class="text-light opacity-75">Code : {{ elem.CodeFrais }}</small>
        </div>

        <div class="card-body">
          
          <div class="d-flex justify-content-between mb-2">
            <span>Total à payer :</span>
            <span class="fw-semibold">{{ elem.Total_A_Payer }}</span>
          </div>

          <div class="d-flex justify-content-between mb-2">
            <span>Déjà payé :</span>
            <span class="fw-semibold ">{{ elem.Total_Deja_Paye }}</span>
          </div>

          <div class="d-flex justify-content-between mb-2">
            <span>Impayé :</span>
            <span class="fw-semibold ">{{ elem.Total_Impaye }}</span>
          </div>

          <hr>

          <div class="d-flex justify-content-between fw-bold">
            <span>Reste à payer :</span>
            <span class="text-danger fs-5">{{ elem.Reste_A_Payer }}</span>
          </div>

        </div>

      </div>
    </div>

  </div>
</div>

  </div>
</section>
 
<div *ngIf="!loading && aucunPaiement" class="alert alert-warning mt-3 text-center">
          Aucun paiement trouvé
        </div>
